<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
    <title>Odin Calculator</title>
</head>
<body>
    <div class="page">
        <div class="container">
            <div class="display"></div>
            <button class="clear">Clear</button>
            <div class="buttons">
                <div class="rowOne">
                    <button class="digit seven">7</button>
                    <button class="digit eight">8</button>
                    <button class="digit nine">9</button>
                    <button class="operator plus">+</button>
                </div>
                <div class="rowTwo">
                    <button class="digit four">4</button>
                    <button class="digit five">5</button>
                    <button class="digit six">6</button>
                    <button class="operator minus">-</button>
                </div>
                <div class="rowThree">
                    <button class="digit one">1</button>
                    <button class="digit two">2</button>
                    <button class="digit three">3</button>
                    <button class="operator mulitply">*</button>
                </div>
                <div class="rowFour">
                    <button class="digit zero">0</button>
                    <button class="digit point">.</button>
                    <button class="operator equals">=</button>
                    <button class="operator divide">/</button>
                </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
